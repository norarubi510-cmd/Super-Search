<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>★ SuperSearch Y2K ★</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<!-- React + Babel from CDN -->
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<!-- Plain JavaScript: API + demo data (must load before the React app) -->
<script src="search.js"></script>

<!-- React app (JSX, transformed in the browser by Babel) -->
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

function ResultCard({ r, onMedia }) {
  if (r.kind === 'image') {
    return (
      <div className="card media-card" onClick={() => onMedia(r)}>
        <img src={r.thumb} alt={r.title} loading="lazy" />
        <div className="cap">{r.title}</div>
      </div>
    );
  }
  if (r.kind === 'video') {
    return (
      <div className="card media-card video" onClick={() => onMedia(r)}>
        <div className="play"><img src={r.thumb} alt={r.title} loading="lazy" /></div>
        <div className="cap">{r.title}</div>
      </div>
    );
  }
  return (
    <div className="card">
      <a className="title" href={r.link} target="_blank" rel="noreferrer">{r.title}</a>
      <div className="src">{r.src}</div>
      <div className="snip">{r.snippet}</div>
    </div>
  );
}

function Settings({ open, apiKey, cx, onSave, onClose }) {
  const [k, setK] = useState(apiKey);
  const [c, setC] = useState(cx);
  useEffect(() => { setK(apiKey); setC(cx); }, [apiKey, cx, open]);
  if (!open) return null;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>⚙ Google API Settings</h3>
        <label>API Key</label>
        <input value={k} onChange={(e) => setK(e.target.value)} placeholder="AIza..." />
        <label>Search Engine ID (cx)</label>
        <input value={c} onChange={(e) => setC(e.target.value)} placeholder="e.g. 0123abc..." />
        
        <div className="modal-actions">
          <button className="go-btn" style={{flex:1}} onClick={() => onSave(k.trim(), c.trim())}>Save</button>
          <button className="icon-btn" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [theme, setTheme] = useState('dark');
  const [query, setQuery] = useState('');
  const [submitted, setSubmitted] = useState('');
  const [tab, setTab] = useState('all');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [demo, setDemo] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [apiKey, setApiKey] = useState('');
  const [cx, setCx] = useState('');
  const [media, setMedia] = useState(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const run = useCallback(async (q, t) => {
    if (!q.trim()) return;
    setLoading(true); setError(''); setResults([]);
    const live = apiKey && cx;
    try {
      if (live) {
        const r = await googleSearch(t, q, apiKey, cx);
        setResults(r); setDemo(false);
      } else {
        await new Promise((res) => setTimeout(res, 300));
        setResults(demoResults(t, q)); setDemo(true);
      }
    } catch (e) {
      setError(e.message + ' — showing demo results instead.');
      setResults(demoResults(t, q)); setDemo(true);
    } finally {
      setLoading(false);
    }
  }, [apiKey, cx]);

  const onSearch = () => {
    if (!query.trim()) return;
    setSubmitted(query);
    run(query, tab);
  };
  const onTab = (t) => {
    setTab(t);
    if (submitted) run(submitted, t);
  };

  const isGrid = (tab === 'images' || tab === 'videos') && results.length > 0;

  return (
    <div className="wrap">
      <div className="topbar">
        <button className="icon-btn" onClick={() => setSettingsOpen(true)}>⚙ Settings</button>
        <button className="icon-btn" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
          {theme === 'dark' ? '☀ Light' : '🌙 Dark'}
        </button>
      </div>

      <h1 className="logo">SuperSearch</h1>
      <p className="tagline">~ surf the web, y2k style ~</p>

      <div className="search-row">
        <div className="search-box">
          <span style={{fontSize:'20px'}}>🔍</span>
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && onSearch()}
            placeholder="Search the whole web..."
            autoFocus
          />
        </div>
        <button className="go-btn" onClick={onSearch}>GO</button>
      </div>

      <div className="tabs">
        {TABS.map((t) => (
          <button key={t.id} className={'tab' + (tab === t.id ? ' active' : '')} onClick={() => onTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {demo && submitted && (
        <div style={{textAlign:'center'}}><span className="badge">demo mode · add API key in ⚙ Settings for live results</span></div>
      )}

      {loading && <div className="status">✨ searching the cosmos...</div>}
      {error && <div className="status">⚠ {error}</div>}
      {!loading && !submitted && <div className="status">Type something groovy and hit GO ✦</div>}
      {!loading && submitted && results.length === 0 && !error && (
        <div className="status">No results found for “{submitted}”.</div>
      )}

      <div className={'results' + (isGrid ? ' grid' : '')}>
        {results.map((r, i) => (
          <ResultCard key={i} r={r} onMedia={setMedia} />
        ))}
      </div>

      <div className="footer">★ SuperSearch — a Y2K front-end for search ★</div>

      <Settings
        open={settingsOpen}
        apiKey={apiKey}
        cx={cx}
        onSave={(k, c) => { setApiKey(k); setCx(c); setSettingsOpen(false); if (submitted) run(submitted, tab); }}
        onClose={() => setSettingsOpen(false)}
      />

      {media && (
        <div className="modal-bg" onClick={() => setMedia(null)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <h3 style={{marginBottom:'12px'}}>{media.title}</h3>
            <img src={media.thumb || media.link} alt={media.title} style={{width:'100%', borderRadius:'14px'}} />
            <div className="modal-actions">
              <a className="go-btn" style={{flex:1, textAlign:'center', textDecoration:'none', lineHeight:'1.6'}} href={media.link} target="_blank" rel="noreferrer">Open ↗</a>
              <button className="icon-btn" onClick={() => setMedia(null)}>Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
